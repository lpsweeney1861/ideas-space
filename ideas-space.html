<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideas Space</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f2ec;
    --surface: #faf8f4;
    --border: #e0dbd0;
    --border-soft: #ede9e1;
    --text: #1a1814;
    --text-muted: #7a7368;
    --text-faint: #b0aa9e;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent-text: #1e3d2a;
    --amber: #9a6200;
    --amber-light: #fdf3dc;
    --red-soft: #f7ece8;
    --mono: 'DM Mono', monospace;
    --serif: 'Instrument Serif', Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; }

  /* Layout */
  .shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 2rem 1.25rem; display: flex; flex-direction: column; gap: 2rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .main { padding: 2.5rem 2rem; max-width: 760px; }

  /* Sidebar */
  .logo { font-family: var(--serif); font-size: 22px; color: var(--text); letter-spacing: -0.3px; line-height: 1.2; }
  .logo span { font-style: italic; color: var(--text-muted); }
  .nav { display: flex; flex-direction: column; gap: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all 0.15s; border: 1px solid transparent; text-decoration: none; }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-text); border-color: #c8dace; font-weight: 500; }
  .nav-icon { font-size: 15px; width: 18px; text-align: center; }
  .nav-badge { margin-left: auto; font-size: 11px; color: var(--text-faint); }

  /* Streak */
  .streak-card { background: var(--amber-light); border: 1px solid #f0d98a; border-radius: 8px; padding: 12px; }
  .streak-num { font-family: var(--serif); font-size: 32px; color: var(--amber); line-height: 1; }
  .streak-label { font-size: 11px; color: var(--amber); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Section headers */
  .page { display: none; }
  .page.active { display: block; }
  .page-title { font-family: var(--serif); font-size: 28px; color: var(--text); margin-bottom: 4px; }
  .page-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 2rem; }

  /* Timer */
  .timer-block { display: flex; align-items: center; gap: 16px; margin-bottom: 1.75rem; padding: 16px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .timer-num { font-family: var(--serif); font-size: 38px; color: var(--text); min-width: 90px; line-height: 1; }
  .timer-num.running { color: var(--accent); }
  .timer-num.done { color: var(--amber); }
  .btn-row { display: flex; gap: 8px; }
  .btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-muted); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: var(--bg); color: var(--text); border-color: var(--text-faint); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-text); }

  /* Daily ideas */
  .idea-rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1rem; }
  .idea-row { display: flex; align-items: flex-start; gap: 10px; }
  .idea-row-num { font-size: 11px; color: var(--text-faint); padding-top: 12px; min-width: 16px; text-align: right; }
  textarea { width: 100%; border: 1px solid var(--border-soft); border-radius: 6px; padding: 9px 12px; font-family: var(--mono); font-size: 13px; color: var(--text); background: var(--surface); resize: none; line-height: 1.6; transition: border-color 0.15s; }
  textarea:focus { outline: none; border-color: var(--accent); background: #fff; }
  .action-row { display: flex; align-items: center; gap: 10px; }
  .toast { font-size: 12px; color: var(--accent); opacity: 0; transition: opacity 0.3s; }

  /* Entry input area */
  .input-area { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
  .input-footer { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .tag-input { padding: 6px 10px; border: 1px solid var(--border-soft); border-radius: 6px; background: var(--bg); font-family: var(--mono); font-size: 12px; color: var(--text); width: 130px; }
  .tag-input:focus { outline: none; border-color: var(--accent); }
  .add-btn { padding: 7px 16px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-muted); font-family: var(--mono); font-size: 12px; cursor: pointer; transition: all 0.15s; margin-left: auto; }
  .add-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .search-input { flex: 1; padding: 7px 12px; border: 1px solid var(--border-soft); border-radius: 6px; background: var(--surface); font-family: var(--mono); font-size: 12px; color: var(--text); }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .filter-btn { padding: 6px 12px; border: 1px solid var(--border-soft); border-radius: 6px; background: transparent; font-family: var(--mono); font-size: 11px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; }
  .filter-btn.active { background: var(--accent-light); color: var(--accent-text); border-color: #c8dace; }
  .filter-btn:hover { border-color: var(--text-faint); }
  .export-btn { padding: 6px 12px; border: 1px solid var(--border-soft); border-radius: 6px; background: transparent; font-family: var(--mono); font-size: 11px; color: var(--text-muted); cursor: pointer; transition: all 0.15s; margin-left: auto; }
  .export-btn:hover { background: var(--bg); }

  /* Entry cards */
  .entry-list { display: flex; flex-direction: column; gap: 6px; }
  .entry-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s; }
  .entry-card:hover { border-color: var(--border); }
  .entry-card.is-fav { border-left: 3px solid var(--accent); }
  .entry-text { font-size: 14px; color: var(--text); line-height: 1.6; white-space: pre-wrap; }
  .entry-footer { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .entry-date { font-size: 11px; color: var(--text-faint); }
  .tag-pill { font-size: 11px; background: var(--bg); color: var(--text-muted); border: 1px solid var(--border-soft); border-radius: 20px; padding: 2px 8px; }
  .fav-btn { margin-left: auto; background: none; border: none; cursor: pointer; font-size: 14px; color: var(--text-faint); padding: 0; transition: color 0.15s; }
  .fav-btn:hover { color: var(--accent); }
  .fav-btn.active { color: var(--accent); }
  .del-btn { background: none; border: none; cursor: pointer; font-size: 11px; color: var(--text-faint); padding: 0; transition: color 0.15s; }
  .del-btn:hover { color: #c0392b; }

  /* Past sessions */
  .session-block { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 8px; padding: 14px 16px; margin-bottom: 8px; }
  .session-date { font-size: 11px; color: var(--text-faint); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
  .session-idea { display: flex; gap: 10px; padding: 3px 0; font-size: 13px; color: var(--text-muted); }
  .session-idea-num { color: var(--text-faint); min-width: 14px; font-size: 11px; padding-top: 2px; }

  /* Empty state */
  .empty { font-size: 13px; color: var(--text-faint); padding: 2rem 0; text-align: center; font-style: italic; }

  /* Loading */
  .loading { font-size: 12px; color: var(--text-faint); padding: 1rem 0; text-align: center; }

  /* Status dot */
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); display: inline-block; margin-right: 6px; }
  .status-dot.ok { background: var(--accent); }
  .status-dot.err { background: #c0392b; }
  .status-text { font-size: 11px; color: var(--text-faint); }

  /* Mobile */
  @media (max-width: 640px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; align-items: center; padding: 1rem; gap: 1rem; border-right: none; border-bottom: 1px solid var(--border); }
    .logo { flex: 1; }
    .nav { flex-direction: row; flex-wrap: wrap; }
    .streak-card { display: none; }
    .main { padding: 1.25rem 1rem; }
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="logo">Ideas<br><span>Space</span></div>
    <nav class="nav">
      <a class="nav-item active" data-page="daily" onclick="showPage('daily')">
        <span class="nav-icon">◎</span> Daily 5
      </a>
      <a class="nav-item" data-page="ideas" onclick="showPage('ideas')">
        <span class="nav-icon">◈</span> Ideas
        <span class="nav-badge" id="nb-ideas"></span>
      </a>
      <a class="nav-item" data-page="questions" onclick="showPage('questions')">
        <span class="nav-icon">◇</span> Questions
        <span class="nav-badge" id="nb-questions"></span>
      </a>
    </nav>
    <div class="streak-card">
      <div class="streak-num" id="streak-num">0</div>
      <div class="streak-label">day streak</div>
    </div>
    <div style="margin-top: auto;">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">connecting...</span>
    </div>
  </aside>

  <main class="main">
    <!-- DAILY -->
    <div class="page active" id="page-daily">
      <div class="page-title">Daily 5</div>
      <div class="page-sub">20 minutes. no judgment. anything goes.</div>

      <div class="timer-block">
        <div class="timer-num" id="timer-display">20:00</div>
        <div class="btn-row">
          <button class="btn primary" id="timer-btn" onclick="toggleTimer()">start</button>
          <button class="btn" onclick="resetTimer()">reset</button>
        </div>
      </div>

      <div class="idea-rows" id="daily-inputs">
        <div class="idea-row"><span class="idea-row-num">1</span><textarea id="d1" rows="2" placeholder="idea one..."></textarea></div>
        <div class="idea-row"><span class="idea-row-num">2</span><textarea id="d2" rows="2" placeholder="idea two..."></textarea></div>
        <div class="idea-row"><span class="idea-row-num">3</span><textarea id="d3" rows="2" placeholder="idea three..."></textarea></div>
        <div class="idea-row"><span class="idea-row-num">4</span><textarea id="d4" rows="2" placeholder="idea four..."></textarea></div>
        <div class="idea-row"><span class="idea-row-num">5</span><textarea id="d5" rows="2" placeholder="idea five..."></textarea></div>
      </div>
      <div class="action-row">
        <button class="btn primary" onclick="saveSession()">save session</button>
        <span class="toast" id="session-toast">saved.</span>
      </div>

      <div style="margin-top: 2.5rem;">
        <div style="font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 1rem;">Past sessions</div>
        <div id="past-sessions"><div class="loading">loading...</div></div>
      </div>
    </div>

    <!-- IDEAS -->
    <div class="page" id="page-ideas">
      <div class="page-title">Ideas</div>
      <div class="page-sub">capture everything. evaluate nothing.</div>
      <div class="input-area">
        <textarea id="idea-input" rows="3" placeholder="an idea..."></textarea>
        <div class="input-footer">
          <input class="tag-input" id="idea-tag" placeholder="tag (optional)" />
          <button class="add-btn" onclick="addIdea()">add idea</button>
        </div>
      </div>
      <div class="toolbar">
        <input class="search-input" id="idea-search" placeholder="search ideas..." oninput="filterIdeas()" />
        <button class="filter-btn" id="fav-filter-ideas" onclick="toggleFavFilter('ideas')">★ favorites</button>
        <button class="export-btn" onclick="exportCSV('ideas')">export csv</button>
      </div>
      <div class="entry-list" id="ideas-list"><div class="loading">loading...</div></div>
    </div>

    <!-- QUESTIONS -->
    <div class="page" id="page-questions">
      <div class="page-title">Questions</div>
      <div class="page-sub">every question you have, logged.</div>
      <div class="input-area">
        <textarea id="q-input" rows="3" placeholder="a question..."></textarea>
        <div class="input-footer">
          <input class="tag-input" id="q-tag" placeholder="tag (optional)" />
          <button class="add-btn" onclick="addQuestion()">add question</button>
        </div>
      </div>
      <div class="toolbar">
        <input class="search-input" id="q-search" placeholder="search questions..." oninput="filterQuestions()" />
        <button class="filter-btn" id="fav-filter-questions" onclick="toggleFavFilter('questions')">★ favorites</button>
        <button class="export-btn" onclick="exportCSV('questions')">export csv</button>
      </div>
      <div class="entry-list" id="questions-list"><div class="loading">loading...</div></div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://rgpdpwtugjdlcebjmwkc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_mhrK9M55ggfhe62ocAMicA_k2GGcVyR';
const H = { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY };

// State
let ideasData = [], questionsData = [], favFilterIdeas = false, favFilterQuestions = false;
let timerInterval = null, timerRunning = false, timerSecs = 1200;

// DB helpers
async function dbGet(table, order = 'created_at.desc') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?order=${order}`, { headers: H });
  return r.ok ? r.json() : [];
}
async function dbInsert(table, data) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method: 'POST', headers: { ...H, 'Prefer': 'return=representation' }, body: JSON.stringify(data) });
}
async function dbUpdate(table, id, data) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'PATCH', headers: H, body: JSON.stringify(data) });
}
async function dbDelete(table, id) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'DELETE', headers: H });
}
async function dbUpsert(table, data) {
  return fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method: 'POST', headers: { ...H, 'Prefer': 'resolution=merge-duplicates' }, body: JSON.stringify(data) });
}

// Nav
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelector(`[data-page="${name}"]`).classList.add('active');
}

// Status
function setStatus(ok, msg) {
  document.getElementById('status-dot').className = 'status-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('status-text').textContent = msg;
}

// Timer
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval); timerRunning = false;
    document.getElementById('timer-btn').textContent = 'resume';
    document.getElementById('timer-display').classList.remove('running');
  } else {
    timerRunning = true;
    document.getElementById('timer-btn').textContent = 'pause';
    document.getElementById('timer-display').classList.add('running');
    timerInterval = setInterval(() => {
      timerSecs--;
      if (timerSecs <= 0) {
        timerSecs = 0; clearInterval(timerInterval); timerRunning = false;
        document.getElementById('timer-btn').textContent = 'start';
        document.getElementById('timer-display').classList.remove('running');
        document.getElementById('timer-display').classList.add('done');
      }
      updateTimerDisplay();
    }, 1000);
  }
}
function resetTimer() {
  clearInterval(timerInterval); timerRunning = false; timerSecs = 1200;
  document.getElementById('timer-btn').textContent = 'start';
  document.getElementById('timer-display').className = 'timer-num';
  updateTimerDisplay();
}
function updateTimerDisplay() {
  const m = String(Math.floor(timerSecs / 60)).padStart(2, '0');
  const s = String(timerSecs % 60).padStart(2, '0');
  document.getElementById('timer-display').textContent = m + ':' + s;
}

// Sessions
async function saveSession() {
  const ideas = [1,2,3,4,5].map(i => document.getElementById('d'+i).value.trim()).filter(Boolean);
  if (!ideas.length) return;
  const today = new Date().toDateString();
  await dbInsert('sessions', { date: today, ideas });
  await updateStreak(today);
  [1,2,3,4,5].forEach(i => document.getElementById('d'+i).value = '');
  const t = document.getElementById('session-toast');
  t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000);
  loadSessions();
}
async function updateStreak(today) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/streak?id=eq.1`, { headers: H });
  const rows = await r.json();
  const streak = rows[0] || { count: 0, last_date: null };
  if (streak.last_date === today) return;
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const newCount = streak.last_date === yesterday.toDateString() ? streak.count + 1 : 1;
  await dbUpsert('streak', { id: 1, count: newCount, last_date: today });
  document.getElementById('streak-num').textContent = newCount;
}
async function loadSessions() {
  const sessions = await dbGet('sessions');
  const el = document.getElementById('past-sessions');
  if (!sessions.length) { el.innerHTML = '<div class="empty">no sessions yet</div>'; return; }
  el.innerHTML = sessions.slice(0, 30).map(s => `
    <div class="session-block">
      <div class="session-date">${s.date}</div>
      ${(s.ideas||[]).map((idea,i) => `<div class="session-idea"><span class="session-idea-num">${i+1}</span>${esc(idea)}</div>`).join('')}
    </div>`).join('');
}

// Ideas
async function addIdea() {
  const text = document.getElementById('idea-input').value.trim();
  if (!text) return;
  const tag = document.getElementById('idea-tag').value.trim();
  await dbInsert('ideas', { text, tag: tag || null, favorite: false });
  document.getElementById('idea-input').value = '';
  document.getElementById('idea-tag').value = '';
  await loadIdeas();
}
async function loadIdeas() {
  ideasData = await dbGet('ideas');
  document.getElementById('nb-ideas').textContent = ideasData.length || '';
  renderIdeas();
}
function renderIdeas() {
  const q = document.getElementById('idea-search').value.toLowerCase();
  let list = ideasData.filter(i => !q || i.text.toLowerCase().includes(q) || (i.tag||'').toLowerCase().includes(q));
  if (favFilterIdeas) list = list.filter(i => i.favorite);
  const el = document.getElementById('ideas-list');
  if (!list.length) { el.innerHTML = '<div class="empty">nothing here yet</div>'; return; }
  el.innerHTML = list.map(item => `
    <div class="entry-card ${item.favorite ? 'is-fav' : ''}">
      <div class="entry-text">${esc(item.text)}</div>
      <div class="entry-footer">
        <span class="entry-date">${fmtDate(item.created_at)}</span>
        ${item.tag ? `<span class="tag-pill">${esc(item.tag)}</span>` : ''}
        <button class="fav-btn ${item.favorite ? 'active' : ''}" onclick="toggleFav('ideas','${item.id}',${item.favorite})">★</button>
        <button class="del-btn" onclick="deleteEntry('ideas','${item.id}')">remove</button>
      </div>
    </div>`).join('');
}
function filterIdeas() { renderIdeas(); }
async function toggleFav(table, id, current) {
  await dbUpdate(table, id, { favorite: !current });
  if (table === 'ideas') await loadIdeas(); else await loadQuestions();
}
async function deleteEntry(table, id) {
  await dbDelete(table, id);
  if (table === 'ideas') await loadIdeas(); else await loadQuestions();
}
function toggleFavFilter(type) {
  if (type === 'ideas') {
    favFilterIdeas = !favFilterIdeas;
    document.getElementById('fav-filter-ideas').classList.toggle('active', favFilterIdeas);
    renderIdeas();
  } else {
    favFilterQuestions = !favFilterQuestions;
    document.getElementById('fav-filter-questions').classList.toggle('active', favFilterQuestions);
    renderQuestions();
  }
}

// Questions
async function addQuestion() {
  const text = document.getElementById('q-input').value.trim();
  if (!text) return;
  const tag = document.getElementById('q-tag').value.trim();
  await dbInsert('questions', { text, tag: tag || null, favorite: false });
  document.getElementById('q-input').value = '';
  document.getElementById('q-tag').value = '';
  await loadQuestions();
}
async function loadQuestions() {
  questionsData = await dbGet('questions');
  document.getElementById('nb-questions').textContent = questionsData.length || '';
  renderQuestions();
}
function renderQuestions() {
  const q = document.getElementById('q-search').value.toLowerCase();
  let list = questionsData.filter(i => !q || i.text.toLowerCase().includes(q) || (i.tag||'').toLowerCase().includes(q));
  if (favFilterQuestions) list = list.filter(i => i.favorite);
  const el = document.getElementById('questions-list');
  if (!list.length) { el.innerHTML = '<div class="empty">nothing here yet</div>'; return; }
  el.innerHTML = list.map(item => `
    <div class="entry-card ${item.favorite ? 'is-fav' : ''}">
      <div class="entry-text">${esc(item.text)}</div>
      <div class="entry-footer">
        <span class="entry-date">${fmtDate(item.created_at)}</span>
        ${item.tag ? `<span class="tag-pill">${esc(item.tag)}</span>` : ''}
        <button class="fav-btn ${item.favorite ? 'active' : ''}" onclick="toggleFav('questions','${item.id}',${item.favorite})">★</button>
        <button class="del-btn" onclick="deleteEntry('questions','${item.id}')">remove</button>
      </div>
    </div>`).join('');
}
function filterQuestions() { renderQuestions(); }

// Export CSV
function exportCSV(type) {
  const data = type === 'ideas' ? ideasData : questionsData;
  if (!data.length) return;
  const rows = [['text','tag','favorite','date'], ...data.map(i => ['"'+i.text.replace(/"/g,'""')+'"', i.tag||'', i.favorite, fmtDate(i.created_at)])];
  const blob = new Blob([rows.map(r => r.join(',')).join('\n')], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = type + '-export.csv'; a.click();
}

// Helpers
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }

// Init
async function init() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/streak?id=eq.1`, { headers: H });
    if (r.ok) {
      setStatus(true, 'connected');
      const rows = await r.json();
      if (rows[0]) document.getElementById('streak-num').textContent = rows[0].count;
    } else { setStatus(false, 'connection error'); }
  } catch(e) { setStatus(false, 'offline'); }
  loadSessions(); loadIdeas(); loadQuestions();
}
init();
</script>
